server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Статические файлы из /documents/ — отдавать напрямую, без fallback на index.html
    location /documents/ {
        try_files $uri =404;
        add_header Content-Disposition "attachment";
    }

    # Статические ресурсы сборки
    location /static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Все остальные маршруты — SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
